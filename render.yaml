# render.yaml — Configuration de déploiement Render
# Placez ce fichier à la racine du dépôt GitHub

services:
  - type: web
    name: battery-soh-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn api_server:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: HIDDEN_SIZE
        value: "64"
      - key: NUM_LAYERS
        value: "2"
      - key: MODEL_PATH
        value: models/lstm_soh.pth
      - key: SCALER_PATH
        value: models/scaler.pkl
      - key: PYTHON_VERSION
        value: "3.11.0"  
    # Le port est injecté automatiquement par Render via $PORT
    # Ne jamais définir un port fixe ici